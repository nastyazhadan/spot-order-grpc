order:
  address: ":50051"
  spot_address: "spot-service:50052"
  create_timeout: "5s"
  check_timeout: "15s"
  log_level: "info"
  log_format: "console"
  max_recv_msg_size: 10485760 # 10MB
  grpc_rate_limit: 1000
  circuit_breaker:
    max_requests: 3
    interval: "10s"
    timeout: "3s"
    max_failures: 5
  postgres_pool:
    max_conns: 10
    min_conns: 2
    max_conn_lifetime: "30m"
    max_conn_idle_time: "5m"
  redis:
    host: "myredis"
    port: 6379
    connection_timeout: "3s"
    pool_size: 10
    min_idle: 2
    max_idle: 10
    max_active_conns: 15
    idle_timeout: "1m"
    max_conn_lifetime: "30m"
  rate_limiter:
    create_order: 5
    get_order_status: 50
    window: "1h"
  tracing:
    exporter_otlp_endpoint: "otel-collector:4317"
    service_name: "order-service"
    environment: "development"
    service_version: "1.0.0"
  metrics:
    http_address: ":9091"
    export_interval: "15s"
    push_gateway_url: "http://pushgateway:9093"
  keep_alive:
    ping_time: "20s"
    ping_timeout: "5s"
    min_ping_interval: "10s"
    permit_without_stream: true

spot:
  address: ":50052"
  log_level: "info"
  log_format: "console"
  load_markets_timeout: "5s"
  max_recv_msg_size: 10485760 # 10MB
  grpc_rate_limit: 1000
  postgres_pool:
    max_conns: 10
    min_conns: 2
    max_conn_lifetime: "30m"
    max_conn_idle_time: "5m"
  redis:
    host: "myredis"
    port: 6379
    connection_timeout: "3s"
    pool_size: 10
    min_idle: 2
    max_idle: 10
    max_active_conns: 15
    idle_timeout: "1m"
    max_conn_lifetime: "30m"
    spot_cache_ttl: "24h"
  tracing:
    exporter_otlp_endpoint: "otel-collector:4317"
    service_name: "spot-service"
    environment: "development"
    service_version: "1.0.0"
  metrics:
    http_address: ":9092"
    export_interval: "15s"
    push_gateway_url: "http://pushgateway:9093"
  keep_alive:
    ping_time: "20s"
    ping_timeout: "5s"
    min_ping_interval: "10s"
    permit_without_stream: true
