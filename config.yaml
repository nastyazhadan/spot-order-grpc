order:
  service:
    address: ":50051"
    name: "order-service"
    max_recv_msg_size: 10485760 # 10MB
  spot_address: "spot-service:50052"
  timeouts:
    service: 5s
    check: 15s
  health:
    check_interval: 10s
    success_threshold: 1
    failure_threshold: 2
  log:
    level: "info"
    format: "console"
    context_fields_max: 10
  auth_verifier:
    skip_methods:
      - "/grpc.health.v1.Health/Check"
      - "/grpc.health.v1.Health/Watch"
      - "/auth.v1.AuthService/RefreshToken"
  auth_issuer:
    access_token_ttl: 15m
    refresh_token_ttl: 24h
  circuit_breaker:
    max_requests: 3
    interval: 10s
    timeout: 3s
    max_failures: 5
  postgres_pool:
    max_conns: 10
    min_conns: 2
    max_conn_lifetime: 30m
    max_conn_idle_time: 5m
  redis:
    host: "myredis"
    port: 6379
    connection_timeout: 3s
    pool_size: 10
    min_idle: 2
    max_idle: 10
    max_active_conns: 15
    idle_timeout: 1m
    max_conn_lifetime: 30m
    market_block_ttl: 10m
    idempotency_ttl: 30m
  grpc_rate_limit:
    create_order: 1000
    get_order_status: 2000
    refresh_token: 500
  rate_limit_by_user:
    create_order: 5
    get_order_status: 50
    window: 1h
  tracing:
    exporter_otlp_endpoint: "otel-collector:4317"
    environment: "development"
    service_version: "1.0.0"
  metrics:
    http_address: ":9091"
    read_timeout: 5s
    write_timeout: 10s
    idle_timeout: 60s
    shutdown_timeout: 10s
  keep_alive:
    ping_time: 20s
    ping_timeout: 5s
    min_ping_interval: 10s
    permit_without_stream: true
  retry:
    max_attempts: 3
    initial_backoff: 100ms
    jitter: 0.1
    per_retry_timeout: 1500ms
  kafka:
    brokers:
      - "kafka:29092"
    producer:
      max_retries: 3
      retry_backoff: 200ms
      timeout: 5s
      compression: "snappy"
    consumer:
      group_id: "order-service"
      session_timeout: 30s
      heartbeat_interval: 3s
      max_retries: 3
      retry_backoff: 500ms
      retry_jitter: 0.2
      max_message_bytes: 524288 # 512KB Kafka consumer fetch/message size limit
      dlq_enabled: true
      dlq_max_message_bytes: 786432 # 768KB
      restart_backoff: 3s
    topics:
      order_created: "order.created"
      order_status_updated: "order.status.updated"
      market_state_changed: "market.state.changed"
      market_state_changed_dlq: "market.state.changed.dlq"
    outbox:
      poll_interval: 1s
      batch_size: 100
      batch_timeout: 5s
      max_retries: 5
      processing_timeout: 5m


spot:
  service:
    address: ":50052"
    name: "spot-service"
    max_recv_msg_size: 10485760 # 10MB
  view_markets:
    default_limit: 100
    max_limit: 500
    cache_limit: 500
  timeouts:
    service: 5s
    check: 15s
  health:
    check_interval: 10s
    success_threshold: 1
    failure_threshold: 2
  log:
    level: "info"
    format: "console"
    context_fields_max: 10
  auth_verifier:
    skip_methods:
      - "/grpc.health.v1.Health/Check"
      - "/grpc.health.v1.Health/Watch"
  grpc_rate_limit:
    view_markets: 1000
    get_market_by_id: 2000
  postgres_pool:
    max_conns: 10
    min_conns: 2
    max_conn_lifetime: 30m
    max_conn_idle_time: 5m
  redis:
    host: "myredis"
    port: 6379
    connection_timeout: 3s
    pool_size: 10
    min_idle: 2
    max_idle: 10
    max_active_conns: 15
    idle_timeout: 1m
    max_conn_lifetime: 30m
    spot_cache_ttl: 5m
  tracing:
    exporter_otlp_endpoint: "otel-collector:4317"
    environment: "development"
    service_version: "1.0.0"
  metrics:
    http_address: ":9093"
    read_timeout: 5s
    write_timeout: 10s
    idle_timeout: 60s
    shutdown_timeout: 10s
  keep_alive:
    ping_time: 20s
    ping_timeout: 5s
    min_ping_interval: 10s
    permit_without_stream: true
  kafka:
    brokers:
      - "kafka:29092"
    producer:
      max_retries: 3
      retry_backoff: 200ms
      timeout: 5s
      compression: "snappy"
    topics:
      market_state_changed: "market.state.changed"
    outbox:
      poll_interval: 1s
      batch_size: 100
      batch_timeout: 5s
      max_retries: 5
      processing_timeout: 5m
  market_poller:
    poll_interval: 1s
    processing_timeout: 5s
    batch_size: 100
    restart_backoff: 3s
