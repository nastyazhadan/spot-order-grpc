services:

  spot-service:
    build:
      context: .
      dockerfile: spotService/Dockerfile
    container_name: spot-service
    environment:
      SPOT_DB_URI: ${SPOT_DB_URI}
    ports:
      - "${SPOT_GRPC_PORT}:50052"
      - "${SPOT_METRICS_PORT}:9092"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: [ "CMD", "grpc_health_probe", "-addr=:50052" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - microservices-net

  order-service:
    build:
      context: .
      dockerfile: orderService/Dockerfile
    container_name: order-service
    environment:
      ORDER_DB_URI: ${ORDER_DB_URI}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${ORDER_GRPC_PORT}:50051"
      - "${ORDER_METRICS_PORT}:9091"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
      spot-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "grpc_health_probe", "-addr=:50051" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - microservices-net

  postgres:
    image: postgres:17.0-alpine3.20
    container_name: mypostgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${ORDER_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./spotService/migrations/db_spot:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${ORDER_DB} && pg_isready -U ${POSTGRES_USER} -d ${SPOT_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - microservices-net

  redis:
    image: redis:7.2.5-alpine3.20
    container_name: myredis
    ports:
      - "${EXTERNAL_REDIS_PORT}:6379"
    command: [ "redis-server", "--save", "", "--appendonly", "no", "--maxmemory-policy", "allkeys-lru" ]
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - microservices-net

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.147.0
    container_name: otel-collector
    command: [ "--config=/etc/otel_collector_config.yaml" ]
    volumes:
      - ./shared/infrastructure/otel/otel_collector_config.yaml:/etc/otel_collector_config.yaml
    ports:
      - "${OTEL_GRPC_PORT}:4317"
      - "${OTEL_HEALTHCHECK_PORT}:13133"
      - "${PROMETHEUS_METRICS_PORT}:8888"
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--spider", "http://localhost:13133/health" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      prometheus:
        condition: service_healthy
      tempo:
        condition: service_healthy
      pushgateway:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - microservices-net

  prometheus:
    image: prom/prometheus:v3.3.1
    container_name: prometheus
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ./shared/infrastructure/prometheus/prometheus_config.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--web.enable-remote-write-receiver'
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - microservices-net

  grafana:
    image: grafana/grafana:12.0.0
    container_name: grafana
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--spider", "http://localhost:3000/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - microservices-net

  tempo:
    image: grafana/tempo:2.7.2
    container_name: tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./shared/infrastructure/tempo/tempo.yaml:/etc/tempo.yaml
      - tempo_data:/var/tempo
    ports:
      - "${TEMPO_HTTP_PORT}:3200"
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--spider", "http://localhost:3200/ready" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - microservices-net

  pushgateway:
    image: prom/pushgateway:v1.10.0
    container_name: pushgateway
    command: [ "--web.listen-address=:9093" ]
    ports:
      - "${PUSHGATEWAY_PORT}:9093"
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--spider", "http://localhost:9093/-/healthy" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - microservices-net

networks:
  microservices-net:
    name: microservices-net
    driver: bridge

volumes:
  pgdata:
  prometheus_data:
  grafana_data:
  tempo_data:
