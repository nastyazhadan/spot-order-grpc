version: "2"

run:
  timeout: 5m
  tests: false

linters:
  default: none
  enable:
    - govet
    - staticcheck
  exclusions:
    generated: strict

formatters:
  enable:
    - gofumpt
  settings:
    gofumpt:
      extra-rules: true
  exclusions:
    generated: strict

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
