global:
  scrape_interval: 15s # для pull модели
  evaluation_interval: 15s # для pull модели

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: [ "localhost:9090" ]

  - job_name: "otel-collector"
    static_configs:
      - targets: [ "otel-collector:8888" ]

  - job_name: "order-service"
    static_configs:
      - targets: [ "order-service:9091" ]

  - job_name: "spot-service"
    static_configs:
      - targets: [ "spot-service:9092" ]

  - job_name: "pushgateway"
    honor_labels: true
    static_configs:
      - targets: [ "pushgateway:9093" ]
