syntax = "proto3";

package events.v1;

option go_package = "zhadan.events.v1;eventsv1";

import "google/protobuf/timestamp.proto";
import "google/type/decimal.proto";
import "common/v1/common.proto";

message OrderCreatedEvent {
  string event_id = 1;
  string order_id = 2;
  string user_id = 3;
  string market_id = 4;
  common.v1.OrderType  order_type = 5;
  google.type.Decimal price = 6;
  int64  quantity = 7;
  common.v1.OrderStatus  status = 8;
  google.protobuf.Timestamp created_at = 9;
}

message OrderStatusUpdatedEvent {
  string event_id = 1;
  string order_id = 2;
  common.v1.OrderStatus new_status = 3;
  string reason = 4;
  string correlation_id = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message MarketStateChangedEvent {
  string event_id = 1;
  string market_id = 2;
  bool enabled = 3;
  google.protobuf.Timestamp deleted_at = 4;
  google.protobuf.Timestamp updated_at = 5;
}
